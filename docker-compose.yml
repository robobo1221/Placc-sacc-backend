version: '3.9'

services:
  db:
    container_name: placcZaccDb
    image: postgres:16-alpine
    ports:
      - '5432:5432'

    env_file:
      - .env

    volumes:
      - ./data/db:/var/lib/postgresql/data/

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    container_name: placcZaccBackend

    build:
      context: ./backend
      dockerfile: Dockerfile

    env_file:
      - .env

    ports:
      - '8000:8000'

    volumes:
      - ./backend:/app/backend

    depends_on:
      db:
        condition: service_healthy